<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caven Cottage - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAAAAZdEVYdFNvZnR3YXJlAHBhaW50Lm5ldCA0LjAuMTM0A1t6AAAAI0lEQVQ4T2P8//8/Ay0xwQAFTAhjYBhFoygYBaNgFIwCMgYAGkUDYQ2q0tkAAAAASUVORK5CYII=">
    <style>
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #d97706;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            z-index: 9999;
            animation: slideIn 0.3s ease-out;
        }
        .notification-success { background-color: #10b981; }
        .notification-error { background-color: #ef4444; }
        .notification-info { background-color: #d97706; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body class="bg-gray-100">
    <!-- Navigation -->
    <div class="bg-white shadow mb-4">
        <div class="container mx-auto px-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-8">
                    <div class="flex items-center space-x-2">
                        <span class="text-2xl">☕</span>
                        <span class="font-bold text-lg text-gray-800">Caven Cottage</span>
                        <span class="text-xs text-gray-500 ml-2">v1.0</span>
                    </div>
                    <div class="flex space-x-6">
                        <a href="/pos.html" class="inline-block py-4 px-2 hover:text-amber-600">💰 POS</a>
                        <a href="/dashboard.html" class="inline-block py-4 px-2 text-amber-600 border-b-2 border-amber-600">📊 Dashboard</a>
                        <a href="/settings.html" class="inline-block py-4 px-2 hover:text-amber-600">⚙️ Settings</a>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="userName" class="text-sm text-gray-600"></span>
                    <button onclick="logout()" class="text-red-500 text-sm hover:text-red-700">Logout</button>
                </div>
            </div>
        </div>
    </div>

    <div class="container mx-auto p-4">
        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow p-6 border-l-4 border-green-500">
                <h3 class="text-gray-500 text-sm uppercase">Today's Sales</h3>
                <p class="text-3xl font-bold" id="todayTotal">$0</p>
                <p class="text-sm text-gray-500" id="todayCount">0 transactions</p>
            </div>
            <div class="bg-white rounded-lg shadow p-6 border-l-4 border-red-500">
                <h3 class="text-gray-500 text-sm uppercase">Low Stock Items</h3>
                <p class="text-3xl font-bold" id="lowStockCount">0</p>
                <p class="text-sm text-red-500">Needs attention</p>
            </div>
            <div class="bg-white rounded-lg shadow p-6 border-l-4 border-amber-500">
                <h3 class="text-gray-500 text-sm uppercase">Total Products</h3>
                <p class="text-3xl font-bold" id="totalProducts">0</p>
                <p class="text-sm text-gray-500">In inventory</p>
            </div>
        </div>
        
        <!-- Product Management -->
        <div class="bg-white rounded-lg shadow">
            <div class="p-6 border-b flex justify-between items-center">
                <h2 class="text-xl font-bold">📦 Product Management</h2>
                <button onclick="showAddProductModal()" class="bg-amber-600 text-white px-4 py-2 rounded hover:bg-amber-700">+ Add Product</button>
            </div>
            <div class="overflow-x-auto p-6">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="p-3 text-left">Name</th>
                            <th class="p-3 text-left">SKU</th>
                            <th class="p-3 text-left">Price</th>
                            <th class="p-3 text-left">Stock</th>
                            <th class="p-3 text-left">Status</th>
                            <th class="p-3 text-left">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="productsTable">
                        <tr>
                            <td colspan="6" class="text-center p-8">
                                <div class="loading mx-auto"></div>
                                <p class="text-gray-400 mt-2">Loading products...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add Product Modal -->
    <div id="productModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 w-96">
            <h3 class="text-xl font-bold mb-4">Add New Product</h3>
            <div class="space-y-3">
                <input type="text" id="prodName" placeholder="Product Name *" class="w-full p-2 border rounded">
                <input type="text" id="prodSKU" placeholder="SKU" class="w-full p-2 border rounded">
                <input type="text" id="prodBarcode" placeholder="Barcode" class="w-full p-2 border rounded">
                <input type="number" id="prodPrice" placeholder="Price *" class="w-full p-2 border rounded">
                <input type="number" id="prodCost" placeholder="Cost" class="w-full p-2 border rounded">
                <input type="number" id="prodQuantity" placeholder="Initial Stock" class="w-full p-2 border rounded">
                <input type="number" id="prodMinStock" placeholder="Min Stock Alert" class="w-full p-2 border rounded">
            </div>
            <div class="flex gap-2 mt-6">
                <button onclick="addProduct()" class="flex-1 bg-amber-600 text-white py-2 rounded hover:bg-amber-700">Save</button>
                <button onclick="closeModal()" class="flex-1 bg-gray-500 text-white py-2 rounded hover:bg-gray-600">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Edit Product Modal -->
    <div id="editModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 w-96">
            <h3 class="text-xl font-bold mb-4">Edit Product</h3>
            <input type="hidden" id="editId">
            <div class="space-y-3">
                <input type="text" id="editName" placeholder="Product Name" class="w-full p-2 border rounded">
                <input type="text" id="editSKU" placeholder="SKU" class="w-full p-2 border rounded">
                <input type="text" id="editBarcode" placeholder="Barcode" class="w-full p-2 border rounded">
                <input type="number" id="editPrice" placeholder="Price" class="w-full p-2 border rounded">
                <input type="number" id="editCost" placeholder="Cost" class="w-full p-2 border rounded">
                <input type="number" id="editQuantity" placeholder="Stock" class="w-full p-2 border rounded">
                <input type="number" id="editMinStock" placeholder="Min Stock Alert" class="w-full p-2 border rounded">
            </div>
            <div class="flex gap-2 mt-6">
                <button onclick="updateProduct()" class="flex-1 bg-green-600 text-white py-2 rounded hover:bg-green-700">Update</button>
                <button onclick="closeEditModal()" class="flex-1 bg-gray-500 text-white py-2 rounded hover:bg-gray-600">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('token');
        if (!token) window.location.href = '/login.html';
        
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        document.getElementById('userName').innerText = user.full_name || user.username;
        
        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = `notification notification-${type}`;
            notification.innerHTML = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }
        
        function authFetch(url, options = {}) {
            options.headers = options.headers || {};
            options.headers['Authorization'] = `Bearer ${token}`;
            return fetch(url, options);
        }
        
        async function loadDashboard() {
            try {
                const salesRes = await authFetch('/api/sales/today');
                const sales = await salesRes.json();
                document.getElementById('todayTotal').innerText = `$${sales.total_today?.toFixed(2) || '0.00'}`;
                document.getElementById('todayCount').innerText = `${sales.sale_count || 0} transactions`;
                
                const stockRes = await authFetch('/api/products/low-stock');
                const lowStock = await stockRes.json();
                document.getElementById('lowStockCount').innerText = lowStock.length;
                
                const productsRes = await authFetch('/api/products');
                const products = await productsRes.json();
                document.getElementById('totalProducts').innerText = products.length;
                
                const tbody = document.getElementById('productsTable');
                if (products.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center p-8 text-gray-400">No products yet. Click "Add Product" to start.办</td></tr>';
                } else {
                    tbody.innerHTML = products.map(p => `
                        <tr class="border-b hover:bg-gray-50">
                            <td class="p-3 font-medium">${escapeHtml(p.name)}</td>
                            <td class="p-3 text-gray-600">${escapeHtml(p.sku || '-')}</td>
                            <td class="p-3">$${p.price.toFixed(2)}</td>
                            <td class="p-3 ${p.quantity <= p.min_stock ? 'text-red-600 font-bold' : ''}">${p.quantity}</td>
                            <td class="p-3"><span class="px-2 py-1 rounded text-xs ${p.quantity <= p.min_stock ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}">${p.quantity <= p.min_stock ? '⚠️ Low Stock' : '✓ In Stock'}</span></td>
                            <td class="p-3">
                                <button onclick="editProduct(${p.id})" class="text-amber-600 hover:text-amber-800 mr-2">✏️ Edit</button>
                                <button onclick="deleteProduct(${p.id})" class="text-red-600 hover:text-red-800">🗑️ Delete</button>
                            </td>
                          </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('Error:', error);
                showNotification('Error loading dashboard', 'error');
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showAddProductModal() {
            document.getElementById('productModal').classList.remove('hidden');
            document.getElementById('productModal').classList.add('flex');
        }
        
        function closeModal() {
            document.getElementById('productModal').classList.add('hidden');
            document.getElementById('productModal').classList.remove('flex');
            ['prodName', 'prodSKU', 'prodBarcode', 'prodPrice', 'prodCost', 'prodQuantity', 'prodMinStock'].forEach(id => {
                document.getElementById(id).value = '';
            });
        }
        
        async function addProduct() {
            const name = document.getElementById('prodName').value;
            const price = document.getElementById('prodPrice').value;
            
            if (!name || !price) {
                showNotification('Please enter product name and price', 'error');
                return;
            }
            
            const product = {
                name: name,
                sku: document.getElementById('prodSKU').value || null,
                barcode: document.getElementById('prodBarcode').value || null,
                price: parseFloat(price),
                cost: parseFloat(document.getElementById('prodCost').value) || 0,
                quantity: parseInt(document.getElementById('prodQuantity').value) || 0,
                min_stock: parseInt(document.getElementById('prodMinStock').value) || 5
            };
            
            const response = await authFetch('/api/products', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(product)
            });
            
            if (response.ok) {
                showNotification('✅ Product added successfully!', 'success');
                closeModal();
                loadDashboard();
            } else {
                showNotification('❌ Error adding product', 'error');
            }
        }
        
        async function editProduct(id) {
            const response = await authFetch('/api/products');
            const products = await response.json();
            const product = products.find(p => p.id === id);
            
            if (product) {
                document.getElementById('editId').value = product.id;
                document.getElementById('editName').value = product.name;
                document.getElementById('editSKU').value = product.sku || '';
                document.getElementById('editBarcode').value = product.barcode || '';
                document.getElementById('editPrice').value = product.price;
                document.getElementById('editCost').value = product.cost || 0;
                document.getElementById('editQuantity').value = product.quantity;
                document.getElementById('editMinStock').value = product.min_stock || 5;
                
                document.getElementById('editModal').classList.remove('hidden');
                document.getElementById('editModal').classList.add('flex');
            }
        }
        
        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
            document.getElementById('editModal').classList.remove('flex');
        }
        
        async function updateProduct() {
            const id = document.getElementById('editId').value;
            const product = {
                name: document.getElementById('editName').value,
                sku: document.getElementById('editSKU').value || null,
                barcode: document.getElementById('editBarcode').value || null,
                price: parseFloat(document.getElementById('editPrice').value),
                cost: parseFloat(document.getElementById('editCost').value) || 0,
                quantity: parseInt(document.getElementById('editQuantity').value) || 0,
                min_stock: parseInt(document.getElementById('editMinStock').value) || 5
            };
            
            const response = await authFetch(`/api/products/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(product)
            });
            
            if (response.ok) {
                showNotification('✅ Product updated successfully!', 'success');
                closeEditModal();
                loadDashboard();
            } else {
                showNotification('❌ Error updating product', 'error');
            }
        }
        
        async function deleteProduct(id) {
            if (confirm('Are you sure you want to delete this product?')) {
                const response = await authFetch(`/api/products/${id}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    showNotification('✅ Product deleted successfully!', 'success');
                    loadDashboard();
                } else {
                    showNotification('❌ Error deleting product', 'error');
                }
            }
        }
        
        function logout() {
            localStorage.clear();
            window.location.href = '/login.html';
        }
        
        loadDashboard();
    </script>
</body>
</html>
